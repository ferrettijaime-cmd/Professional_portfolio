services:

  postgres:
    image: postgres:17

    container_name: postgres_db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.5

    container_name: airflow_init

    env_file:
      - airflow.env

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}

    depends_on:
      - postgres

    command: >
      bash -c "
       airflow db migrate &&
       airflow users create \
       --username ${_AIRFLOW_WWW_USER_USERNAME} \
       --password ${_AIRFLOW_WWW_USER_PASSWORD} \
       --firstname ${AIRFLOW_FIRSTNAME} \
       --lastname ${AIRFLOW_LASTNAME} \
       --role Admin \
       --email ${AIRFLOW_EMAIL}
      "

  airflow-webserver:
    image: apache/airflow:2.10.5

    container_name: airflow_webserver

    env_file:
      - airflow.env

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__WORKERS: 1

    depends_on:
      - airflow-init

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./Script_Python:/opt/airflow/Script_Python
      - ./Script_SQL:/opt/airflow/Script_SQL
      - ./Data:/opt/airflow/Data
      - ./.env:/opt/airflow/.env
      - ./.env.airflow:/opt/airflow/.env.airflow

    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.5

    container_name: airflow_scheduler

    env_file:
      - airflow.env

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}

    depends_on:
      - airflow-init

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./Script_Python:/opt/airflow/Script_Python
      - ./Script_SQL:/opt/airflow/Script_SQL
      - ./Data:/opt/airflow/Data
      - ./.env:/opt/airflow/.env
      - ./.env.airflow:/opt/airflow/.env.airflow

    command: scheduler

volumes:
  postgres_data: